<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Mandi-Connect</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#0f3d2e">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">🌾 Mandi<span>Connect</span></div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="empty-state" style="margin-top:60px;">
        <div class="empty-icon">📶</div>
        <h3 style="font-size:1.4rem;color:var(--primary-dark);">You're Offline</h3>
        <p style="margin-top:8px;color:var(--text-muted);max-width:320px;margin:12px auto 0;">
          No internet connection. Don't worry — any crops you've added offline will sync when you're back online.
        </p>
        <div class="mt-3">
          <button onclick="window.location.reload()" class="btn btn-primary">Try Again</button>
          <a href="farmer-dashboard.html" class="btn btn-outline mt-1">Go to Dashboard</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
